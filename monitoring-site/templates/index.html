<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="{{ url_for('static', filename='tailwind.js') }}"></script>
        <title>Network Monitor</title>
    </head>
    <body class="flex h-screen bg-zinc-900 text-neutral-200 overflow-hidden">
        
        <div class="flex flex-col space-y-4 p-6 border-r border-zinc-700 w-64 bg-zinc-800 shrink-0">
            <h2 class="text-xl font-bold text-center mb-4 text-white">Views</h2>
            <button onclick="showView('interfaces')" class="p-2 rounded-md text-center bg-zinc-600 hover:bg-zinc-500 text-white transition-colors">Interfaces</button>
            <button onclick="showView('run_conf')" class="p-2 rounded-md text-center bg-blue-600 hover:bg-blue-500 text-white transition-colors">Running config</button>
            <button onclick="showView('port_security')" class="p-2 rounded-md text-center bg-red-600 hover:bg-red-500 text-white transition-colors">Port security</button>
            <button onclick="showView('ospf')" class="p-2 rounded-md text-center bg-yellow-600 hover:bg-yellow-500 text-white transition-colors">OSPF Neighbor</button>
            <button onclick="showView('stp')" class="p-2 rounded-md text-center bg-green-600 hover:bg-green-500 text-white transition-colors">Spanning tree</button>
            <button onclick="showView('vlans')" class="p-2 rounded-md text-center bg-orange-600 hover:bg-orange-500 text-white transition-colors">VLANs</button>
        </div>
        
        <div class="flex-1 flex flex-col p-8 overflow-y-auto">
            <div class="flex flex-col items-center w-full max-w-5xl mx-auto">
                <h1 class="text-3xl font-bold mb-8 text-white text-center">Network Monitor</h1>
                
                <div class="w-full bg-zinc-800 p-6 rounded-lg shadow-lg mb-8">
                    <h2 class="text-xl font-semibold mb-4 text-white">Device Discovery</h2>
                    <div class="flex space-x-4">
                        <input type="text" id="subnetInput" value="192.168.1.0/24" class="bg-zinc-700 border border-zinc-600 text-white rounded-md px-4 py-2 flex-1 focus:outline-none focus:border-blue-500">
                        <button id="scanBtn" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 px-6 rounded transition-colors" onclick="startScan()">Discover Devices</button>
                    </div>
                    <div id="results" class="mt-6 w-full"></div>
                </div>

                <div id="deviceDetails" class="w-full"></div>
            </div>
        </div>

        <script>
            let currentDevice = null;
            window.scannedDevices = [];

            document.addEventListener("DOMContentLoaded", async () => {
                const resultsDiv = document.getElementById('results');
                resultsDiv.innerHTML = "<div class='text-blue-400 text-center animate-pulse'>Loading preloaded devices...</div>";
                
                try {
                    const response = await fetch('/get_devices');
                    const data = await response.json();
                    
                    if (data.devices && data.devices.length > 0) {
                        window.scannedDevices = data.devices;
                        renderDeviceList();
                    } else {
                        resultsDiv.innerHTML = "<div class='text-gray-400 text-center'>No devices preloaded. Try running a discovery scan.</div>";
                    }
                } catch (error) {
                    console.error("Error fetching preloaded devices:", error);
                    resultsDiv.innerHTML = "<div class='text-red-400 text-center'>Error loading cached devices.</div>";
                }
            });

            function startScan() {
                const input = document.getElementById('subnetInput').value.trim();
                if (input.includes("/")) {
                    runFullDiscovery(input);
                } else {
                    checkSingleIP(input);
                }
            }

            async function checkSingleIP(ip) {
                const btn = document.getElementById('scanBtn');
                const resultsDiv = document.getElementById('results');
                
                setButtonState(btn, "Checking IP...", true);
                resultsDiv.innerHTML = `<div class='text-blue-400 text-center animate-pulse'>Checking if ${ip} is a new SSH device...</div>`;

                try {
                    const response = await fetch('/check_ip', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ ip: ip })
                    });

                    const data = await response.json();
                    
                    if (response.ok && data.device) {
                        const existingIndex = window.scannedDevices.findIndex(d => d.ip === ip);
                        if (existingIndex >= 0) {
                            window.scannedDevices[existingIndex] = data.device;
                        } else {
                            window.scannedDevices.push(data.device);
                        }
                        renderDeviceList();
                    } else {
                        resultsDiv.innerHTML = `<div class='bg-yellow-900 border border-yellow-700 text-yellow-200 px-4 py-3 rounded mb-4'>${data.message}</div>`;
                        setTimeout(renderDeviceList, 3000);
                    }
                } catch (error) {
                    console.error("Error checking IP:", error);
                    resultsDiv.innerHTML = "<div class='bg-red-900 border border-red-700 text-red-200 px-4 py-3 rounded'>Error connecting to backend.</div>";
                    setTimeout(renderDeviceList, 3000);
                } finally {
                    setButtonState(btn, "Discover Devices", false);
                }
            }

            async function runFullDiscovery(subnet) {
                const btn = document.getElementById('scanBtn');
                const resultsDiv = document.getElementById('results');
                
                setButtonState(btn, "Scanning...", true);
                resultsDiv.innerHTML = `<div class='text-blue-400 text-center animate-pulse'>Scanning network ${subnet}... This may take a moment.</div>`;
                document.getElementById("deviceDetails").innerHTML = "";
                currentDevice = null;

                try {
                    const response = await fetch('/run_discovery', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ subnet: subnet })
                    });

                    const data = await response.json();
                    
                    if (data.devices && data.devices.length > 0) {
                        window.scannedDevices = data.devices; 
                        renderDeviceList();
                    } else {
                        resultsDiv.innerHTML = `<div class='bg-yellow-900 border border-yellow-700 text-yellow-200 px-4 py-3 rounded'>No responsive SSH devices found on ${subnet}.</div>`;
                    }

                } catch (error) {
                    console.error("Error during scan:", error);
                    resultsDiv.innerHTML = "<div class='bg-red-900 border border-red-700 text-red-200 px-4 py-3 rounded'>Error connecting to backend.</div>";
                } finally {
                    setButtonState(btn, "Discover Devices", false);
                }
            }

            function renderDeviceList() {
                const resultsDiv = document.getElementById('results');
                if (!window.scannedDevices || window.scannedDevices.length === 0) {
                    resultsDiv.innerHTML = "";
                    return;
                }

                let buttonsHtml = "<div class='grid grid-cols-1 md:grid-cols-3 gap-4'>";
                window.scannedDevices.forEach((device, index) => {
                    buttonsHtml += `
                        <button id="btn-device-${index}" class="device-btn bg-zinc-700 hover:bg-zinc-600 text-white p-4 rounded-lg border border-zinc-500 transition-all text-left flex flex-col" onclick="selectDevice(${index})">
                            <span class="font-bold text-lg">${device.hostname}</span>
                            <span class="text-sm text-gray-400">${device.ip}</span>
                        </button>
                    `;
                });
                buttonsHtml += "</div>";
                resultsDiv.innerHTML = buttonsHtml;
            }

            function setButtonState(btn, text, disabled) {
                btn.innerText = text;
                btn.disabled = disabled;
                if (disabled) {
                    btn.classList.add('opacity-50', 'cursor-not-allowed');
                } else {
                    btn.classList.remove('opacity-50', 'cursor-not-allowed');
                }
            }

            function selectDevice(deviceIndex) {
                currentDevice = window.scannedDevices[deviceIndex];
                showView('interfaces');
                
                document.querySelectorAll('.device-btn').forEach(btn => btn.classList.remove('ring-2', 'ring-blue-500'));
                document.getElementById(`btn-device-${deviceIndex}`).classList.add('ring-2', 'ring-blue-500');
            }

            function showView(viewType) {
                if (!currentDevice) {
                    alert("Please select a device first.");
                    return;
                }

                const container = document.getElementById("deviceDetails");
                if (viewType === 'interfaces') {
                    renderInterfaces(container);
                } else {
                    renderTextOutput(container, viewType);
                }
            }

            function renderInterfaces(container) {
                let html = `
                    <div class="bg-zinc-800 rounded-lg shadow-lg overflow-hidden">
                        <div class="p-4 bg-zinc-900 border-b border-zinc-700">
                            <h2 class="text-xl font-bold text-white">Interfaces for ${currentDevice.hostname} (${currentDevice.ip})</h2>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="min-w-full text-left">
                                <thead>
                                    <tr>
                                        <th class="py-3 px-4 border-b border-zinc-700 bg-zinc-800 text-gray-400 font-semibold">Interface</th>
                                        <th class="py-3 px-4 border-b border-zinc-700 bg-zinc-800 text-gray-400 font-semibold">IP Address</th>
                                        <th class="py-3 px-4 border-b border-zinc-700 bg-zinc-800 text-gray-400 font-semibold">Status</th>
                                    </tr>
                                </thead>
                                <tbody>
                `;

                for (let i = 0; i < currentDevice.interfaces.length; i++) {
                    let intf = currentDevice.interfaces[i];
                    let statusColor = intf.status === "Shutdown" ? "text-red-400" : "text-green-400";
                    html += `
                        <tr class="hover:bg-zinc-700 transition-colors">
                            <td class="py-3 px-4 border-b border-zinc-700">${intf.name}</td>
                            <td class="py-3 px-4 border-b border-zinc-700">${intf.ip}</td>
                            <td class="py-3 px-4 border-b border-zinc-700 font-bold ${statusColor}">${intf.status}</td>
                        </tr>
                    `;
                }

                html += `</tbody></table></div></div>`;
                container.innerHTML = html;
            }

            function renderTextOutput(container, key) {
                const titles = {
                    'run_conf': 'Running Configuration',
                    'port_security': 'Port Security',
                    'ospf': 'OSPF Neighbors',
                    'stp': 'Spanning Tree',
                    'vlans': 'VLAN Information'
                };

                const output = currentDevice[key] || "No output or command not supported on this device.";
                
                container.innerHTML = `
                    <div class="bg-zinc-800 rounded-lg shadow-lg overflow-hidden flex flex-col h-[600px]">
                        <div class="p-4 bg-zinc-900 border-b border-zinc-700 shrink-0">
                            <h2 class="text-xl font-bold text-white">${titles[key]} for ${currentDevice.hostname} (${currentDevice.ip})</h2>
                        </div>
                        <div class="flex-1 p-4 overflow-y-auto bg-black">
                            <pre class="text-green-400 font-mono text-sm whitespace-pre-wrap">${output}</pre>
                        </div>
                    </div>
                `;
            }
        </script>
    </body>
</html>
