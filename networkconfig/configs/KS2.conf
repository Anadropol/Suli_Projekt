hostname KS2

vlan 10
 name HR
vlan 20
 name SALES
vlan 30
 name MARKETING
vlan 88
 name MANAGEMENT
vlan 99
 name BLACKHOLE
vlan 100
 name SERVICES

no cdp run
no lldp run
spanning-tree mode rapid-pvst
spanning-tree portfast bpduguard default
spanning-tree portfast bpdufilter default

no service tcp-small-servers
no service udp-small-servers
no ip http server
no ip http secure-server

interface FastEthernet0/1
 description ACCESS_HR_VLAN10
 switchport mode access
 switchport access vlan 10
 switchport nonegotiate
 spanning-tree portfast
 spanning-tree bpduguard enable
 switchport port-security
 switchport port-security maximum 1
 switchport port-security mac-address sticky
 switchport port-security violation shutdown
 ip dhcp snooping limit rate 15
 ip arp inspection limit rate 100
 no cdp enable
 no lldp transmit
 no lldp receive
 no shutdown

interface FastEthernet0/2
 description ACCESS_SALES_VLAN20
 switchport mode access
 switchport access vlan 20
 switchport nonegotiate
 spanning-tree portfast
 spanning-tree bpduguard enable
 switchport port-security
 switchport port-security maximum 1
 switchport port-security mac-address sticky
 switchport port-security violation shutdown
 ip dhcp snooping limit rate 15
 ip arp inspection limit rate 100
 no cdp enable
 no lldp transmit
 no lldp receive
 no shutdown

interface FastEthernet0/3
 description ACCESS_MARKETING_VLAN30
 switchport mode access
 switchport access vlan 30
 switchport nonegotiate
 spanning-tree portfast
 spanning-tree bpduguard enable
 switchport port-security
 switchport port-security maximum 1
 switchport port-security mac-address sticky
 switchport port-security violation shutdown
 ip dhcp snooping limit rate 15
 ip arp inspection limit rate 100
 no cdp enable
 no lldp transmit
 no lldp receive
 no shutdown


interface range FastEthernet0/6 - 7
 description ETHERCHANNEL_MEMBER
 switchport mode trunk
 switchport trunk allowed vlan 10,20,30,88,100
 switchport trunk native vlan 99
 switchport nonegotiate
 channel-group 1 mode active
 spanning-tree guard root
 no cdp enable
 no lldp transmit
 no lldp receive
 no shutdown

interface port-channel 1
 description ETHERCHANNEL_TRUNK
 switchport mode trunk
 switchport trunk allowed vlan 10,20,30,88,100
 switchport trunk native vlan 99
 switchport nonegotiate
 spanning-tree guard root
 no shutdown


interface GigabitEthernet0/1
 description TO_KR1
 switchport mode trunk
 switchport trunk allowed vlan 10,20,30,88,100
 switchport trunk native vlan 99
 switchport nonegotiate
 spanning-tree guard root
 no cdp enable
 no lldp transmit
 no lldp receive
 no shutdown

interface GigabitEthernet0/2
 description TO_KR2
 switchport mode trunk
 switchport trunk allowed vlan 10,20,30,88,100
 switchport trunk native vlan 99
 switchport nonegotiate
 spanning-tree guard root
 no cdp enable
 no lldp transmit
 no lldp receive
 no shutdown

interface vlan 88
 description MANAGEMENT
 ip address 192.168.88.8 255.255.255.0
 no shutdown


interface range FastEthernet0/4 - 5
 description UNUSED_DISABLED
 switchport mode access
 switchport access vlan 99
 switchport nonegotiate
 spanning-tree portfast
 spanning-tree bpduguard enable
 no cdp enable
 no lldp transmit
 no lldp receive
 shutdown

interface range FastEthernet0/8 - 24
 description UNUSED_DISABLED
 switchport mode access
 switchport access vlan 99
 switchport nonegotiate
 spanning-tree portfast
 spanning-tree bpduguard enable
 no cdp enable
 no lldp transmit
 no lldp receive
 shutdown


ip dhcp snooping
ip dhcp snooping vlan 10,20,30,88,100
no ip dhcp snooping information option


ip arp inspection vlan 10,20,30,88,100

spanning-tree mode rapid-pvst
spanning-tree portfast bpduguard default


ip default-gateway 192.168.88.1

ip access-list standard MGMT_ACCESS
 permit 192.168.88.0 0.0.0.255
 deny   any log

line vty 0 15
 access-class MGMT_ACCESS in
 transport input ssh
 exec-timeout 5 0
 login local

line console 0
 exec-timeout 5 0
 login local