ipv6 unicast-routing

ipv6 router ospf 10
 router-id 1.1.1.1
 passive-interface g0/0/1.10
 passive-interface g0/0/1.20
 passive-interface g0/0/1.30
 passive-interface g0/0/1.88
 passive-interface g0/0/1.100

interface g0/0/0
 crypto map MY_MAP
 no sh 
int s0/2/0
 ipv6 ospf 10 a 0 
 no sh


interface g0/0/1.10
 encapsulation dot1Q 10
 standby version 2
 standby 10 ip 192.168.10.1
 standby 10 priority 110
 standby 10 preempt
 standby 10 timers 1 3
 standby 10 track g0/0/1 20
 ipv6 ospf 10 a 0 


interface g0/0/1.20
 encapsulation dot1Q 20
 standby version 2
 standby 20 ip 192.168.20.1
 standby 20 priority 110
 standby 20 preempt
 standby 20 timers 1 3
 standby 20 track g0/0/1 20
 ipv6 ospf 10 a 0 


interface g0/0/1.30
 encapsulation dot1Q 30
 standby version 2
 standby 30 ip 192.168.30.1
 standby 30 priority 110
 standby 30 preempt
 standby 30 timers 1 3
 standby 30 track g0/0/1 20
 ipv6 ospf 10 a 0 

interface g0/0/1.88
 encapsulation dot1Q 88
 standby version 2
 standby 88 ip 192.168.88.1
 standby 88 priority 110
 standby 88 preempt
 standby 88 timers 1 3
 standby 88 track g0/0/1 20
 ipv6 ospf 10 a 0 
interface g0/0/1.100
 encapsulation dot1Q 100
 standby version 2
 standby 100 ip 192.168.100.1
 standby 100 priority 110
 standby 100 preempt
 standby 100 timers 1 3
 standby 100 track g0/0/1 2

router ospf 10 
 passive-interface g0/0/1.10
 passive-interface g0/0/1.20
 passive-interface g0/0/1.30
 passive-interface g0/0/1.88
 passive-interface g0/0/1.100
 passive-interface g0/0/0

 network 192.168.10.0 0.0.0.255 a 0
 network 192.168.20.0 0.0.0.255 a 0
 network 192.168.30.0 0.0.0.255 a 0
 network 192.168.88.0 0.0.0.255 a 0
 network 192.168.100.0 0.0.0.255 a 0
 def ori
 router- 1.1.1.1


router bgp 10 
 bgp router-id 2.2.2.2
 neighbor 9.11.69.65 remote-as 100
 neighbor 192.168.0.2 remote-as 100

 crypto isakmp policy 10
  encryption aes 256
  hash sha256
  authentication pre-share
  group 14
crypto isakmp key test address 9.11.69.70
crypto ipsec transform-set MY_SET esp-aes 256 esp-sha256-hmac
ip access-list extended VPN_ACL
  permit ip 192.168.0.0 0.0.128.255 192.168.0.0 0.0.128.255
crypto map MY_MAP 10 ipsec-isakmp
  set peer 9.11.69.70
  set transform-set MY_SET
  match address VPN_ACL